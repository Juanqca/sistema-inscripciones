<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Materias</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .materia-item { display: flex; justify-content: space-between; padding: 10px; margin: 10px 0; border-bottom: 1px solid #ddd; text-align: left; }
        .btn-registrar { background-color: #2ecc71; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
        .btn-registrar:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📚 Selección de Materias Disponibles</h2>
        
        <div id="lista-materias">
            <div class="materia-item">
                <label><input type="checkbox" class="materia-check" value="Matemática I"> Matemática I (5 Créditos)</label>
            </div>
            <div class="materia-item">
                <label><input type="checkbox" class="materia-check" value="Programación I"> Programación I (4 Créditos)</label>
            </div>
            <div class="materia-item">
                <label><input type="checkbox" class="materia-check" value="Física I"> Física I (5 Créditos)</label>
            </div>
            <div class="materia-item">
                <label><input type="checkbox" class="materia-check" value="Base de Datos"> Base de Datos (4 Créditos)</label>
            </div>
        </div>

        <button id="btn-registrar" class="btn-registrar">📝 Registrar Materias</button>
    </div>
<button id="btn-registrar" class="btn-registrar">📝 Registrar Materias</button>

        <div id="comprobante" style="display: none; margin-top: 30px; padding: 20px; border: 2px dashed #2ecc71; background-color: #f9fffb; border-radius: 8px; text-align: left;">
            <h3 style="color: #27ae60; margin-top: 0; text-align: center;">✅ ¡Inscripción Completada con Éxito!</h3>
            <p><strong>Número de Registro:</strong> <span id="num-registro" style="font-family: monospace; color: #e67e22; font-weight: bold; font-size: 1.1rem;"></span></p>
            
            <h4>🕒 Tu Horario Actualizado:</h4>
            <div id="tabla-horario" style="color: #34495e;">
                </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
