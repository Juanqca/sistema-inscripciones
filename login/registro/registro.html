
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>
    <div class="form-container">
        <h2>Formulario de Inscripción</h2>
        <form id="registroForm">
            
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" required placeholder="Ej. Juan Carlos Torrez">
            </div>

            <div class="form-group">
                <label for="ci">Cédula de Identidad (CI):</label>
                <input type="text" id="ci" required placeholder="Ej. 8074123">
            </div>

            <div class="form-group">
                <label for="carrera">Carrera:</label>
                <select id="carrera" required>
                    <option value="" disabled selected>Selecciona tu carrera</option>
                    <option value="sistemas">Ingeniería de Sistemas</option>
                    <option value="datos">Ciencia de Datos</option>
                    <option value="informatica">Informática</option>
                </select>
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" required placeholder="ejemplo@correo.com">
            </div>

            <button type="submit" class="btn-submit">Registrar Estudiante</button>
        </form>
        <div id="mensajeExito" class="hidden alert"></div>
    </div>
    <script src="registro.js"></script>
</body>
</html>
